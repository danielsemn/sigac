            <button onclick="setState({roleType: 'patient'})" class="flex-1 py-2 text-sm font-medium rounded-md transition-all ${state.roleType === 'patient' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}">Para Pacientes</button>
            <button onclick="setState({roleType: 'doctor'})" class="flex-1 py-2 text-sm font-medium rounded-md transition-all ${state.roleType === 'doctor' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}">Para Médicos</button>

          </button>
          <div class="w-full max-w-md mt-10 sm:mt-0">
            <div class="text-center mb-8">
              <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl text-white mb-4 shadow-lg"><i data-lucide="stethoscope" class="w-8 h-8"></i></div>
              <h1 class="text-3xl font-bold text-slate-900 tracking-tight">SIGAC</h1>
              <p class="text-slate-500 mt-2">Sistema Inteligente de Gestão e Agendamento</p>
            </div>
            ${Card({ children: state.authView === 'login' ? loginContent : registerContent, className: 'p-6' })}
          </div>
        </div>
      `;
    }

    // --- MAIN APP SHELL ---
    function AppShell() {
      return `
        <div class="min-h-screen flex flex-col font-sans text-slate-900 bg-slate-50 animate-fade">
          <header class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 h-16 flex items-center justify-between shadow-sm shrink-0">
            <div class="flex items-center gap-2 text-blue-600 cursor-pointer" onclick="setState({route: 'landing'})">
              <i data-lucide="stethoscope" class="w-6 h-6"></i><span class="font-bold text-xl tracking-tight hidden sm:block">SIGAC</span>
            </div>
            <div class="flex items-center gap-4">
              ${Badge({ children: state.activeRole === 'patient' ? 'Portal do Paciente' : 'Portal do Médico', variant: 'primary', className: 'hidden sm:flex shadow-sm' })}
              <button onclick="setState({route: 'landing', activeRole: null})" class="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors">Sair</button>
            </div>
          </header>
          <main class="flex-1 flex flex-col relative overflow-hidden h-[calc(100vh-64px)]">
            ${state.activeRole === 'patient' ? PatientApp() : DoctorApp()}
          </main>

        </div>
      `;
    }

    // --- PATIENT APP ---
    function PatientApp() {
      const NavButton = (icon, label, id) => `
        <button onclick="setState({patientTab: '${id}'})" class="flex flex-col items-center p-2 min-w-[70px] transition-colors rounded-xl ${state.patientTab === id ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}">
          <i data-lucide="${icon}" class="w-6 h-6 ${state.patientTab === id ? 'fill-blue-50' : ''}"></i><span class="text-[10px] font-medium mt-1">${label}</span>
        </button>
      `;

      let content = '';
      if (state.patientTab === 'home') content = PatientHome();
      if (state.patientTab === 'schedule') content = PatientSchedulingFlow();
      if (state.patientTab === 'profile') content = PatientProfile();

      return `
        <div class="flex-1 flex flex-col w-full md:max-w-md mx-auto bg-slate-50 relative h-full md:shadow-2xl md:border-x border-slate-200 overflow-hidden">
          <div class="flex-1 overflow-y-auto pb-[72px] scroll-smooth animate-fade">${content}</div>
          <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around p-2 pb-safe z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            ${NavButton('home', 'Início', 'home')}
            ${NavButton('activity', 'Agendar', 'schedule')}
            ${NavButton('user', 'Perfil', 'profile')}
          </nav>
        </div>
      `;
    }

    function PatientHome() {
      window.openCancelModal = () => {
        setState({ modal: { isOpen: true, title: 'Cancelar Consulta', content: `
          <div class="text-center py-4">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i></div>
            <h4 class="font-bold text-lg mb-2">Tem certeza?</h4>
            <p class="text-slate-500 text-sm mb-6">Deseja realmente cancelar a sua consulta com ${mockDoctors[0].name}? Esta ação não pode ser desfeita.</p>
            <div class="flex gap-3">
              ${Button({ children: 'Manter Consulta', variant: 'outline', className: 'flex-1', onClick: "setState({modal: {isOpen: false}})" })}
              ${Button({ children: 'Sim, Cancelar', variant: 'danger', className: 'flex-1', onClick: "setState({modal: {isOpen: false}, upcomingAppt: false})" })}
            </div>
          </div>
        `}});
      };

      window.openHistoryDetails = (id) => {
        const hist = mockPatientHistory.find(h => h.id === id);
        setState({ modal: { isOpen: true, title: 'Detalhes da Consulta', content: `
          <div class="space-y-4">
            <div class="flex gap-4 items-center border-b border-slate-100 pb-4">
              <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-lg">${hist.doctor.charAt(4)}</div>
              <div><h3 class="font-bold text-slate-900">${hist.doctor}</h3><p class="text-sm text-blue-600 font-medium">${hist.specialty}</p></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div><p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-1">Data</p><p class="text-sm font-medium text-slate-800">${hist.date}</p></div>
              <div><p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-1">Status</p>${Badge({ children: hist.status, variant: 'success' })}</div>
            </div>
            <div class="bg-slate-50 p-4 rounded-lg mt-4 border border-slate-100">
              <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-2">Resumo / Notas Médicas</p>
              <p class="text-sm text-slate-700 italic leading-relaxed">"${hist.notes}"</p>
            </div>
          </div>
        `}});
      };

      return `
        <div class="p-4 space-y-6">
          <header class="pt-4"><h1 class="text-2xl font-bold text-slate-900">Olá, Roberto!</h1><p class="text-slate-500">Como podemos cuidar de você hoje?</p></header>
          ${Card({ className: 'bg-gradient-to-br from-blue-600 to-blue-800 border-none text-white p-5 cursor-pointer hover:shadow-lg transform active:scale-[0.98]', onClick: "setState({patientTab: 'schedule'})", children: `
            <div class="flex justify-between items-center">
              <div><h2 class="font-bold text-lg mb-1 flex items-center gap-2"><i data-lucide="stethoscope" class="w-5 h-5"></i> Nova Consulta</h2><p class="text-blue-100 text-sm">Fale com a nossa IA e encontre o especialista ideal.</p></div>
              <i data-lucide="chevron-right" class="w-6 h-6 text-blue-200"></i>
            </div>
          `})}
          ${state.upcomingAppt ? `
            <section>
              <h3 class="font-bold text-slate-900 mb-3 flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> Próxima Consulta</h3>
              ${Card({ className: 'p-4 border-l-4 border-l-blue-500', children: `
                <div class="flex justify-between items-start mb-4">
                  <div class="flex gap-3">
                    <img src="${mockDoctors[0].avatar}" class="w-12 h-12 rounded-full border border-slate-100 shadow-sm" />
                    <div><h4 class="font-bold text-slate-900">${mockDoctors[0].name}</h4><p class="text-sm text-blue-600 font-medium">${mockDoctors[0].specialty}</p></div>
                  </div>
                  ${Badge({ children: 'Confirmado', variant: 'primary' })}
                </div>
                <div class="bg-slate-50 p-3 rounded-lg flex items-center gap-4 text-sm font-medium text-slate-700 mb-4 border border-slate-100">
                  <div class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4 text-blue-500"></i> Hoje, 5 Mai</div>
                  <div class="flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4 text-blue-500"></i> 14:00</div>
                </div>
                <div class="flex gap-2">
                  ${Button({ children: 'Reagendar', variant: 'outline', className: 'flex-1 text-xs h-9', onClick: "setState({patientTab: 'schedule'})" })}
                  ${Button({ children: 'Cancelar', variant: 'outline', className: 'flex-1 text-xs h-9 border-red-200 text-red-600 hover:bg-red-50', onClick: "openCancelModal()" })}
                </div>
              `})}
            </section>
          ` : ''}
          <section>
            <h3 class="font-bold text-slate-900 mb-3 flex items-center gap-2"><i data-lucide="history" class="w-4 h-4"></i> Histórico Recente</h3>
            <div class="space-y-3">
              ${mockPatientHistory.slice(0, 2).map(hist => Card({ className: 'p-4 flex justify-between items-center bg-white border-slate-200 hover:bg-slate-50 cursor-pointer', onClick: `openHistoryDetails(${hist.id})`, children: `
                <div><h4 class="font-semibold text-slate-900">${hist.doctor}</h4><p class="text-xs text-slate-500">${hist.specialty} • ${hist.date}</p></div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400"></i>
              `})).join('')}
            </div>
          </section>
        </div>
      `;
    }

    // --- PATIENT SCHEDULING FLOW (IA) ---
    const normalizeStr = (str) => { if (!str) return ''; return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,?!]/g, "").toLowerCase(); };

    window.handleChatSubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input-field');
      const text = input.value;
      if (!text.trim()) return;

      const newUserMessage = { id: Date.now(), sender: 'User', text };
      const newFullRelato = state.fullRelato ? `${state.fullRelato} E também: ${text}` : text;
      
      setState({
        chatMessages: [...state.chatMessages, newUserMessage],
        fullRelato: newFullRelato,
        scheduleStep: 'loading',
        loadingText: 'Analisando risco e urgência...'
      });

      // Simula steps da IA
      setTimeout(() => setState({ loadingText: 'Extraindo entidades clínicas...' }), 800);
      setTimeout(() => setState({ loadingText: 'Buscando especialistas...' }), 1600);
      setTimeout(() => analyzeContextAndMatch(newFullRelato, state.chatMessages.filter(m => m.sender === 'User').length), 2400);
    };

    function analyzeContextAndMatch(text, userMsgCount) {
      const normalizedText = normalizeStr(text);
      const medicalUrgentKeywords = ["emergencia", "sangrand", "desmai", "falta de ar", "insuportavel", "dor no peito", "infarto", "acidente", "convulsao", "hemorragi", "dor no braco esquerd", "avc", "derrame"];
      const mentalUrgentKeywords = ["suicidio", "me matar", "se matar", "tirar a vida", "acabar com tudo", "nao quer viver", "quer morrer", "automutil"];

      let currentUrgency = null;
      if (mentalUrgentKeywords.some(kw => new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText))) currentUrgency = 'mental';
      else if (medicalUrgentKeywords.some(kw => new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText))) currentUrgency = 'medical';

      let tags = [];
      mockDoctors.forEach(doc => {
        doc.keywords.forEach(kw => {
          if (new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText) && !tags.includes(kw)) tags.push(kw);
        });
      });
      const finalTags = tags.filter(tag => {
        const normTag = normalizeStr(tag);
        return !tags.some(otherTag => {
          const normOther = normalizeStr(otherTag);
          return normOther !== normTag && normOther.startsWith(normTag);
        });
      });

      let scoredDocs = mockDoctors.map(doc => {
        let score = 0;
        doc.keywords.forEach(kw => { if (new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText)) score += 1; });
        return { ...doc, score };
      });

      let bestMatches = scoredDocs.filter(d => d.score > 0).sort((a, b) => b.score - a.score);

      if (!currentUrgency && bestMatches.length === 0) {
        if (userMsgCount === 1 && text.length < 15) {
          setState({ chatMessages: [...state.chatMessages, { id: Date.now(), sender: 'Lumi', text: 'Entendi. Para que a minha análise clínica seja mais precisa, você poderia me dar mais detalhes?' }], scheduleStep: 'chat' });
          return;
        }
        if (userMsgCount === 1 && (normalizedText.includes('ansiedad') || normalizedText.includes('trist') || normalizedText.includes('depress'))) {
          setState({ chatMessages: [...state.chatMessages, { id: Date.now(), sender: 'Lumi', text: 'Sinto muito que esteja passando por isso. Há algum acontecimento recente que você sinta que possa ter desencadeado essas emoções?' }], scheduleStep: 'chat' });
          return;
        }
        if (userMsgCount <= 2) {
          setState({ chatMessages: [...state.chatMessages, { id: Date.now(), sender: 'Lumi', text: 'Ainda estou tentando mapear o melhor caminho para você. Como isso tem afetado o seu dia a dia recentemente?' }], scheduleStep: 'chat' });
          return;
        }
        bestMatches = mockDoctors.filter(d => d.specialty === 'Clínica Geral');
      }

      setState({ extractedTags: finalTags, urgencyType: currentUrgency, matchedDoctors: bestMatches.slice(0, 3), scheduleStep: 'results' });
    }

    function PatientSchedulingFlow() {
      if (state.scheduleStep === 'chat') {
        setTimeout(() => {
          const c = document.getElementById('chat-scroll-view');
          if(c) c.scrollTop = c.scrollHeight;
          document.getElementById('chat-input-field').focus();
        }, 50);

        return `
          <div class="h-full flex flex-col bg-white animate-fade">
            <div id="chat-scroll-view" class="flex-1 flex flex-col gap-4 overflow-y-auto pr-2 hide-scrollbar pt-4 p-4">
              ${state.chatMessages.map(msg => `
                <div class="flex gap-3 items-end ${msg.sender === 'User' ? 'justify-end' : ''}">
                  ${msg.sender === 'Lumi' ? `<div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 flex items-center justify-center shrink-0 shadow-sm border border-blue-200"><i data-lucide="sparkles" class="w-4 h-4 text-blue-600"></i></div>` : ''}
                  <div class="${msg.sender === 'User' ? 'bg-blue-600 text-white rounded-br-none shadow-md' : 'bg-slate-100 text-slate-800 rounded-bl-none border border-slate-200'} p-3 md:p-4 rounded-2xl text-sm max-w-[85%]">
                    ${msg.sender === 'Lumi' ? `<p class="font-bold text-blue-800 mb-1 text-[10px] uppercase tracking-wider">Lumi (IA)</p>` : ''}
                    <p class="leading-relaxed">${msg.text}</p>
                  </div>
                </div>
              `).join('')}
            </div>
            <form onsubmit="handleChatSubmit(event)" class="relative mt-4 border-t border-slate-100 p-4 shrink-0 bg-white">
              <input type="text" id="chat-input-field" placeholder="Digite o que está sentindo..." class="w-full bg-slate-50 border border-slate-200 rounded-full pl-5 pr-14 py-3.5 text-sm outline-none focus:border-blue-500 focus:bg-white" autocomplete="off" />
              <button type="submit" class="absolute right-6 top-[22px] w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 shadow-sm"><i data-lucide="send" class="w-4 h-4 ml-1"></i></button>
            </form>
          </div>
        `;
      }

      if (state.scheduleStep === 'loading') {
        return `
          <div class="flex-1 flex flex-col items-center justify-center p-6 text-center animate-fade h-full">
            <div class="relative w-20 h-20 mb-6 flex items-center justify-center">
              <div class="absolute inset-0 rounded-full border-4 border-slate-100 border-t-blue-600 animate-spin"></div>
              <i data-lucide="sparkles" class="w-6 h-6 text-blue-600"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-800">${state.loadingText}</h3>
            <p class="text-sm text-slate-500 mt-2 animate-pulse">A Lumi está cruzando os seus dados clínicos...</p>
          </div>
        `;
      }

      if (state.scheduleStep === 'results') {
        window.editRelato = () => {
          setState({
            scheduleStep: 'chat', extractedTags: [], urgencyType: null,
            chatMessages: [{ id: 1, sender: 'Lumi', text: 'Vamos ajustar o seu relato. O que você gostaria de corrigir ou adicionar?' }]
          });
          setTimeout(() => document.getElementById('chat-input-field').value = state.fullRelato, 50);
        };

        let urgencyHtml = '';
        if (state.urgencyType === 'medical') urgencyHtml = `<div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4 shadow-sm flex items-start gap-3"><i data-lucide="alert-triangle" class="w-6 h-6 text-red-600 shrink-0 mt-0.5"></i><div><h3 class="font-bold text-red-800 text-sm">Atenção: Possível Urgência Médica</h3><p class="text-red-700 text-xs mt-1">Ligue 192 (SAMU) se for emergência.</p></div></div>`;
        else if (state.urgencyType === 'mental') urgencyHtml = `<div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-4 shadow-sm flex items-start gap-3"><i data-lucide="alert-triangle" class="w-6 h-6 text-purple-600 shrink-0 mt-0.5"></i><div><h3 class="font-bold text-purple-800 text-sm">Você não está sozinho.</h3><p class="text-purple-700 text-xs mt-1">Ligue para 188 (CVV). É gratuito e 24h.</p></div></div>`;

        return `
          <div class="flex-1 flex flex-col p-4 bg-slate-50 overflow-y-auto animate-fade h-full pb-20">
            ${urgencyHtml}
            <div class="bg-white border border-slate-200 rounded-xl p-4 mb-6 shadow-sm">
              <div class="flex justify-between items-start mb-3">
                <h3 class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-blue-500"></i> Relato Unificado</h3>
                <button onclick="editRelato()" class="text-blue-600 text-xs font-semibold flex items-center gap-1 hover:bg-blue-50 px-2 py-1 rounded-md"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Editar</button>
              </div>
              <p class="text-slate-600 text-sm italic mb-4">"${state.fullRelato}"</p>
              ${state.extractedTags.length > 0 ? `
                <div class="border-t border-slate-100 pt-3">
                  <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-2 flex items-center gap-1">Entidades Identificadas</p>
                  <div class="flex flex-wrap gap-1.5">${state.extractedTags.map(tag => `<span class="bg-blue-50 text-blue-700 border border-blue-100 text-[10px] font-semibold px-2 py-0.5 rounded-md capitalize">${tag}</span>`).join('')}</div>
                </div>
              ` : ''}
            </div>
            <h2 class="text-lg font-bold text-slate-900 mb-4">Especialistas Sugeridos</h2>
            <div class="flex flex-col gap-3">
              ${state.matchedDoctors.map(doc => Card({ onClick: `setState({selectedDoctor: ${JSON.stringify(doc).replace(/"/g, '&quot;')}, scheduleStep: 'scheduling'})`, className: 'border-blue-100 hover:border-blue-300', children: `
                <div class="p-4 flex gap-4">
                  <img src="${doc.avatar}" class="w-14 h-14 rounded-full border border-slate-100 object-cover" />
                  <div class="flex-1">
                    <div class="flex justify-between items-start">
                      <h3 class="font-bold text-slate-900 leading-tight">${doc.name}</h3>
                      ${Badge({ children: `Match: ${doc.affinity}`, variant: 'primary' })}
                    </div>
                    <p class="text-sm text-blue-600 font-medium mt-0.5">${doc.specialty}</p>
                    <p class="text-xs text-slate-500 mb-2 truncate">${doc.subspecialty}</p>
                    <p class="text-[11px] text-slate-600 bg-slate-50 p-1.5 rounded inline-block font-medium border border-slate-100">Perfil: ${doc.vibe}</p>
                  </div>
                </div>
              `})).join('')}
            </div>
          </div>
        `;
      }

      if (state.scheduleStep === 'scheduling') {
        const doc = state.selectedDoctor;
        return `
          <div class="flex-1 flex flex-col p-4 bg-white overflow-y-auto animate-fade h-full">
            <button onclick="setState({scheduleStep: 'results'})" class="text-sm text-slate-500 font-medium flex items-center mb-6"><i data-lucide="chevron-left" class="w-4 h-4"></i> Voltar</button>
            <div class="flex items-center gap-4 mb-6 pb-6 border-b border-slate-100">
              <img src="${doc.avatar}" class="w-16 h-16 rounded-full shadow-sm" />
              <div><h2 class="text-lg font-bold text-slate-900">${doc.name}</h2><p class="text-sm text-blue-600 font-medium">${doc.specialty}</p></div>
            </div>
            <h3 class="font-semibold text-slate-900 mb-3 text-sm uppercase tracking-wide">Escolha o Dia</h3>
            <div class="flex gap-2 overflow-x-auto pb-4 hide-scrollbar mb-4">
              ${availableDates.map(d => `<button onclick="setState({selectedDate: '${d}', selectedTime: ''})" class="shrink-0 px-4 py-2.5 rounded-xl border text-sm font-medium transition-all ${state.selectedDate === d ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}">${d}</button>`).join('')}
            </div>
            <h3 class="font-semibold text-slate-900 mb-3 text-sm uppercase tracking-wide">Escolha o Horário</h3>
            <div class="grid grid-cols-3 gap-3 mb-8">
              ${availableTimes.map(t => `<button onclick="setState({selectedTime: '${t}'})" class="py-2.5 rounded-xl border text-sm font-medium transition-all ${state.selectedTime === t ? 'bg-blue-100 border-blue-500 text-blue-800 shadow-inner' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}">${t}</button>`).join('')}
            </div>
            ${Button({ children: 'Confirmar Agendamento', className: 'w-full mt-auto mb-4 py-6 text-base', onClick: state.selectedTime ? "setState({scheduleStep: 'success'})" : "" })}
          </div>
        `;
      }

      if (state.scheduleStep === 'success') {
        window.finishAppt = () => {
          setState({ patientTab: 'home', scheduleStep: 'chat', chatMessages: [{ id: 1, sender: 'Lumi', text: 'Olá! Sou a Lumi ✨ Como você está se sentindo hoje?' }], fullRelato: '', upcomingAppt: true });
        };
        return `
          <div class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-blue-600 text-white h-full animate-fade">
            <i data-lucide="check-circle-2" class="w-24 h-24 mb-6 text-white animate-fade"></i>
            <h2 class="text-3xl font-bold mb-2">Agendado!</h2>
            <p class="text-blue-100 mb-10 text-lg">Consulta confirmada com sucesso.</p>
            ${Button({ children: 'Voltar ao Início', variant: 'outline', className: 'w-full bg-white text-blue-600 border-none hover:bg-blue-50 py-6 font-bold', onClick: "finishAppt()" })}
          </div>
        `;
      }
    }

    function PatientProfile() {
      if (state.patientProfileScreen === 'personal') return `

    // --- DOCTOR APP ---
    function DoctorApp() {
      if (state.activePatientRecord) return MedicalRecordView();

      const DocNavBtn = (icon, label, id) => `
        <button onclick="setState({docTab: '${id}', isMobileMenuOpen: false})" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold whitespace-nowrap transition-all ${state.docTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}">
          <i data-lucide="${icon}" class="w-4 h-4"></i> <span>${label}</span>
        </button>
      `;

      let content = '';
      if (state.docTab === 'dashboard') content = DocOverview();
      if (state.docTab === 'patients') content = DocPatientsList();
      if (state.docTab === 'calendar') content = DocCalendar();

      return `
        <div class="flex-1 flex flex-col md:flex-row bg-slate-50 w-full h-full relative animate-fade">
          <div class="md:hidden p-4 bg-white border-b border-slate-200 flex justify-between items-center">

            <button onclick="setState({isMobileMenuOpen: !state.isMobileMenuOpen})" class="p-2 text-slate-600"><i data-lucide="${state.isMobileMenuOpen ? 'x' : 'layout-dashboard'}" class="w-6 h-6"></i></button>

              <img src="${mockDoctors[0].avatar}" class="w-12 h-12 rounded-full border border-slate-200 shadow-sm" />
              <div><h3 class="font-bold text-sm text-slate-900">Dra. Ana Silva</h3><p class="text-xs text-slate-500 font-medium">Neurologista</p></div>

               <button onclick="setState({route: 'landing', activeRole: null})" class="flex items-center gap-3 px-3 py-2.5 w-full text-left rounded-lg text-sm font-medium text-red-600 hover:bg-red-50">Sair da Conta</button>
            </div>

          <main class="flex-1 overflow-y-auto p-4 md:p-8">${content}</main>

    function DocOverview() {
      window.openDocPreview = (id) => {

        setState({ modal: { isOpen: true, title: 'Resumo do Paciente (IA)', content: `
          <div class="p-2 space-y-4">
            <div><h2 class="text-2xl font-bold text-slate-900">${apt.patient}</h2><p class="text-sm font-medium text-slate-500">${apt.time} • ${apt.type}</p></div>
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-5 relative overflow-hidden">
              <h4 class="flex items-center gap-2 text-sm font-bold text-blue-900 mb-3 relative z-10"><i data-lucide="stethoscope" class="w-4 h-4"></i> Triagem da Lumi (IA)</h4>
              <p class="text-sm text-slate-800 italic leading-relaxed border-l-4 border-blue-400 pl-4 bg-white/60 p-3 rounded-r-lg relative z-10">"${apt.triage}"</p>
            </div>
            ${Button({ children: 'Abrir Prontuário Eletrônico', className: 'w-full py-6 text-base mt-4', onClick: `setState({activePatientRecord: ${JSON.stringify(apt).replace(/"/g, '&quot;')}, modal: {isOpen: false}})` })}
          </div>
        `}});
      };

      return `
        <div class="max-w-5xl mx-auto pb-10 animate-fade">
          <header class="mb-8"><h1 class="text-3xl font-bold text-slate-900 mb-1">Bom dia, Dra. Ana.</h1><p class="text-slate-500">Aqui está o resumo da sua agenda para hoje.</p></header>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            ${Card({ className: 'p-5 border-l-4 border-l-blue-600', children: `<p class="text-sm font-semibold text-slate-500 mb-2 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-blue-600"></i> Consultas Hoje</p><p class="text-4xl font-black text-slate-800">5</p>` })}
            ${Card({ className: 'p-5', children: `<p class="text-sm font-semibold text-slate-500 mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-amber-500"></i> Primeiras Vezes</p><p class="text-4xl font-black text-slate-800">3</p>` })}
            ${Card({ className: 'p-5', children: `<p class="text-sm font-semibold text-slate-500 mb-2 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4 text-green-500"></i> Retornos</p><p class="text-4xl font-black text-slate-800">2</p>` })}
          </div>
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-200 flex justify-between items-center bg-slate-50/50"><h2 class="font-bold text-lg text-slate-900">Sua Agenda</h2>${Badge({ children: 'Hoje, 5 Mai', variant: 'primary' })}</div>
            <div class="divide-y divide-slate-100">
              ${mockAppointments.map(apt => `
                <div class="flex flex-col sm:flex-row sm:items-center p-4 hover:bg-slate-50 transition-colors group gap-4 sm:gap-0">
                  <div class="w-20 shrink-0 sm:border-r border-slate-100 sm:mr-6 text-left sm:text-center"><span class="text-xl font-bold text-slate-900">${apt.time}</span></div>
                  <div class="flex-1 cursor-pointer" onclick="openDocPreview(${apt.id})">
                    <h3 class="font-bold text-lg text-slate-900 group-hover:text-blue-600 transition-colors">${apt.patient}</h3>
                    ${Badge({ children: apt.type, variant: apt.type === 'Primeira Consulta' ? 'warning' : 'success', className: 'mt-2' })}
                  </div>
                  ${Button({ children: 'Iniciar Atendimento', variant: 'outline', className: 'text-blue-600 border-blue-200 hover:bg-blue-50 font-semibold text-sm self-start sm:self-center', onClick: `setState({activePatientRecord: ${JSON.stringify(apt).replace(/"/g, '&quot;')}})` })}
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function DocPatientsList() {
      window.handleSearch = (e) => setState({ patientSearch: e.target.value });
      const filtered = mockAllPatients.filter(p => p.name.toLowerCase().includes(state.patientSearch.toLowerCase()));

      return `
        <div class="max-w-5xl mx-auto h-full flex flex-col pb-10 animate-fade">
          <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
            <div><h1 class="text-3xl font-bold text-slate-900 mb-1">Meus Pacientes</h1><p class="text-slate-500">Gestão e histórico de pacientes da clínica.</p></div>
            <div class="relative w-full md:w-80">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
              <input type="text" placeholder="Buscar por nome..." value="${state.patientSearch}" oninput="handleSearch(event)" class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" autofocus />
            </div>
          </div>
          ${Card({ className: 'flex-1 overflow-hidden flex flex-col border-none shadow-md', children: `
            <div class="overflow-x-auto">
              <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-slate-100 border-b border-slate-200 text-slate-700"><tr><th class="px-6 py-4 font-bold">Nome do Paciente</th><th class="px-6 py-4 font-bold">Última Consulta</th><th class="px-6 py-4 font-bold">Contato</th><th class="px-6 py-4 font-bold text-right">Ações</th></tr></thead>
                <tbody class="divide-y divide-slate-100">
                  ${filtered.map(p => `
                    <tr class="hover:bg-slate-50 transition-colors">
                      <td class="px-6 py-4 font-semibold text-slate-900">${p.name}</td>
                      <td class="px-6 py-4 text-slate-600">${p.lastVisit === 'Hoje' ? Badge({ children: 'Hoje', variant: 'success' }) : p.lastVisit}</td>
                      <td class="px-6 py-4 text-slate-600"><p class="font-medium">${p.phone}</p><p class="text-xs text-slate-400">${p.email}</p></td>
                      <td class="px-6 py-4 text-right">${Button({ children: 'Ver Prontuário', variant: 'secondary', className: 'h-9 text-xs', onClick: `setState({activePatientRecord: { patient: '${p.name}', id: ${p.id}, type: 'Consulta Histórica', triage: 'Dados via busca.' }})` })}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
              ${filtered.length === 0 ? `<div class="text-center py-12 text-slate-500">Nenhum paciente encontrado.</div>` : ''}
            </div>
          `})}
        </div>
      `;
    }

              <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="calendar" class="w-10 h-10 text-slate-400"></i></div>

            </div>

    function MedicalRecordView() {

      const TabBtn = (id, label) => `<button onclick="setState({emrTab: '${id}'})" class="text-left px-4 py-3 rounded-xl text-sm font-bold transition-all ${state.emrTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}">${label}</button>`;

      let emrContent = '';
      if (state.emrTab === 'resumo') emrContent = `
        <div class="max-w-3xl space-y-6 pb-20 md:pb-0 animate-fade">

              <div><label class="block text-sm font-bold text-slate-700 mb-1.5">Subjetivo <span class="font-normal text-slate-400">(Queixa)</span></label><textarea class="w-full border border-slate-200 rounded-xl p-4 text-sm min-h-[100px] focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">${p.triage}</textarea></div>

                <div><label class="block text-sm font-bold text-slate-700 mb-1.5">Plano</label><input type="text" class="w-full border border-slate-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Ex: Prescrição" /></div>
              </div>
            </div>
            <div class="mt-8 flex justify-end">${Button({ children: 'Salvar Anotação e Assinar', className: 'px-8 py-6 text-base shadow-lg' })}</div>
          `})}

        <div class="max-w-3xl animate-fade">

              <p class="text-sm font-medium text-slate-500 mb-3 flex items-center gap-2"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> 10 Jan 2026 • Dra. Beatriz Costa</p>
              ${Card({ className: 'p-5 bg-white border-slate-200 shadow-sm', children: `<p class="text-sm text-slate-700 leading-relaxed">Paciente compareceu para check-up anual. Queixou-se de leve cansaço ao final do dia. Exame físico sem alterações significativas. PA 120x80 mmHg, FC 72 bpm. <br/><br/><strong>Conduta:</strong> Solicitados exames laboratoriais de rotina.</p>` })}
            </div>
          </div>
        </div>

      if (state.emrTab === 'exames') emrContent = `

          <p class="text-slate-500 max-w-sm mx-auto">Os resultados de exames do paciente aparecerão aqui quando disponíveis.</p>
          ${Button({ children: 'Solicitar Novo Exame', variant: 'outline', className: 'mt-6' })}

      return `
        <div class="flex-1 flex flex-col h-full bg-white z-50 absolute inset-0 overflow-hidden animate-fade">
          <header class="bg-slate-900 text-white p-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
              <button onclick="setState({activePatientRecord: null})" class="p-2 hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>

            ${Button({ children: 'Finalizar Consulta', className: 'bg-blue-600 hover:bg-blue-500 text-white border-none h-10 font-bold hidden sm:flex', onClick: "setState({activePatientRecord: null})" })}
          </header>
          <div class="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-50">
            <aside class="w-full md:w-80 bg-white border-r border-slate-200 shrink-0 flex flex-col overflow-y-auto">
              <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                <h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-4">Informações de Contato</h3>
                <div class="space-y-4 text-sm font-medium">
                  <p class="flex items-center gap-3 text-slate-700"><i data-lucide="phone" class="w-4 h-4 text-slate-400"></i> (11) 98765-4321</p>
                  <p class="flex items-center gap-3 text-slate-700"><i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> contato@paciente.com</p>
                  <p class="flex gap-3 text-slate-700 items-start"><i data-lucide="map-pin" class="w-4 h-4 text-slate-400 shrink-0 mt-0.5"></i> <span>Av. Paulista, 1000<br/>São Paulo, SP</span></p>
                </div>
              </div>
              <div class="p-4 flex-1">
                <h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-3 ml-2">Navegação</h3>
                <nav class="flex flex-col gap-1.5">${TabBtn('resumo', 'Visão Geral (Hoje)')}${TabBtn('historico', 'Evolução e Histórico')}${TabBtn('exames', 'Exames e Anexos')}</nav>
              </div>
            </aside>
            <main class="flex-1 p-4 md:p-8 overflow-y-auto relative">${emrContent}</main>
          </div>
        </div>
      `;
    }

    // --- MODAL RENDERER ---
    function ModalRenderer() {
      if (!state.modal.isOpen) return '';
      return `
        <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade">
          <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50/50">
              <h3 class="font-bold text-lg text-slate-900">${state.modal.title}</h3>
              <button onclick="setState({modal: {isOpen: false}})" class="p-1.5 rounded-full hover:bg-slate-200 text-slate-500 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-4 overflow-y-auto">${state.modal.content}</div>
          </div>
        </div>
      `;
    }

    // ==========================================
    // 5. RENDER ENGINE
    // ==========================================
    function render() {
      const root = document.getElementById('root');
      if (state.route === 'landing') root.innerHTML = LandingPage();
      else if (state.route === 'auth') root.innerHTML = AuthScreen();
      else root.innerHTML = AppShell();
      
      root.innerHTML += ModalRenderer();
      lucide.createIcons();
    }

    // Start App
    render();
  </script>
</body>
</html>
