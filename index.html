                                                    <input type="text" placeholder="Ex: Neurologia" className="w-1/2 border border-slate-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 focus:bg-white transition-all" />

        // --- MAIN ENTRY POINT ---
        function MainApp() {
            const [route, setRoute] = useState('landing'); 
            const [authView, setAuthView] = useState('login'); 
            const [activeRole, setActiveRole] = useState(null); 

            const handleNavigateAuth = (targetRoute, targetView = 'login') => {
                setAuthView(targetView);
                setRoute(targetRoute);
            };

            const handleLogin = (role) => {
                setActiveRole(role);
                setRoute('app');
            };

            const handleLogout = () => {
                setActiveRole(null);
                setRoute('landing');
            };

            return (
                <AnimatePresence mode="wait">
                    {route === 'landing' && (
                        <motion.div key="landing" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen">
                            <LandingPage onNavigate={handleNavigateAuth} />
                        </motion.div>
                    )}
                    
                    {route === 'auth' && (
                        <motion.div key="auth" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen">
                            <AuthScreen onLogin={handleLogin} onBack={() => setRoute('landing')} initialView={authView} />
                        </motion.div>
                    )}

                    {route === 'app' && (
                        <motion.div key="app" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen">
                            <AppDashboard activeRole={activeRole} onLogout={handleLogout} />
                        </motion.div>
                    )}
                </AnimatePresence>
            );
        }

        // --- MAIN DASHBOARD SHELL ---
        function AppDashboard({ activeRole, onLogout }) {
            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col">
                    {/* Global Header */}
                    <header className="sticky top-0 z-50 glass-header border-b border-slate-200/60 px-6 h-16 flex items-center justify-between shadow-sm shrink-0">
                        <div className="flex items-center gap-3 text-blue-600">
                            <Stethoscope size={24} strokeWidth={2.5} />
                            <span className="font-extrabold text-xl tracking-tight hidden sm:block text-slate-900">SIGAC</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <Badge variant="primary" className="hidden sm:flex px-3 py-1.5 shadow-sm">
                                {activeRole === 'patient' ? 'Portal do Paciente' : 'Portal do Profissional'}
                            </Badge>
                            <button onClick={onLogout} className="text-sm font-bold text-slate-500 hover:text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-all">
                                Sair
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative overflow-hidden h-[calc(100vh-64px)]">
                        <AnimatePresence mode="wait">
                            {activeRole === 'patient' ? <PatientApp key="patient" onLogout={onLogout} /> : <DoctorApp key="doctor" onLogout={onLogout} />}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        // ==========================================
        // 1. PATIENT APP & SCREENS
        // ==========================================
        function PatientApp({ onLogout }) {
            const [currentTab, setCurrentTab] = useState('home');

            return (
                <div className="flex-1 flex flex-col max-w-lg w-full mx-auto bg-white relative h-full shadow-2xl shadow-slate-200/50 sm:border-x border-slate-200/50">
                    <div className="flex-1 overflow-y-auto pb-20 hide-scrollbar scroll-smooth">
                        <AnimatePresence mode="wait">
                            {currentTab === 'home' && <PatientHome key="home" onSchedule={() => setCurrentTab('schedule')} />}
                            {currentTab === 'schedule' && <PatientSchedulingFlow key="schedule" onFinish={() => setCurrentTab('home')} />}
                            {currentTab === 'profile' && <PatientProfile key="profile" onLogout={onLogout} />}
                        </AnimatePresence>
                    </div>

                    {/* Bottom Navigation */}
                    <nav className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around p-2 pb-safe z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                        <NavButton icon={Home} label="Início" active={currentTab === 'home'} onClick={() => setCurrentTab('home')} />
                        <NavButton icon={Activity} label="Agendar" active={currentTab === 'schedule'} onClick={() => setCurrentTab('schedule')} />
                        <NavButton icon={User} label="Perfil" active={currentTab === 'profile'} onClick={() => setCurrentTab('profile')} />
                    </nav>
                </div>
            );

        const NavButton = ({ icon: Icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center p-2 min-w-[75px] rounded-xl transition-all duration-200 ${active ? 'text-blue-600 bg-blue-50/50' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}>
                <Icon size={24} strokeWidth={active ? 2.5 : 2} className={active ? 'drop-shadow-sm' : ''} />
                <span className={`text-[11px] mt-1.5 ${active ? 'font-bold' : 'font-medium'}`}>{label}</span>
            </button>
        );

        // --- CHATBOT & SCHEDULING FLOW (LUMI IA ENGINE) ---
        function PatientSchedulingFlow({ onFinish }) {
            const [step, setStep] = useState('chat');
            const [chatInput, setChatInput] = useState('');
            const [fullRelato, setFullRelato] = useState('');
            const [messages, setMessages] = useState([
                { id: 1, sender: 'Lumi', text: 'Olá! Sou a Lumi, a inteligência artificial do SIGAC ✨ Conta pra mim: como você está se sentindo hoje? Seja o mais detalhista possível.' }
            ]);
            const [loadingText, setLoadingText] = useState('');
            const [matchedDoctors, setMatchedDoctors] = useState([]);
            const [selectedDoctor, setSelectedDoctor] = useState(null);
            const [selectedDate, setSelectedDate] = useState(availableDates[0]);
            const [selectedTime, setSelectedTime] = useState('');

            const [extractedTags, setExtractedTags] = useState([]);
            const [urgencyType, setUrgencyType] = useState(null); 
            const [clinicalInsight, setClinicalInsight] = useState('');

            // Palavras-chave expandidas e severas
            const medicalUrgentKeywords = ["emergencia", "sangrand", "desmai", "falta de ar", "insuportavel", "dor no peito", "infarto", "acidente", "convulsao", "hemorragi", "dor no braco esquerd", "avc", "derrame", "asfixia", "engasgad", "picad", "choqu", "parada cardiaca", "balead", "facad", "tiro", "atropelad", "queimadur grav", "venen", "intoxic", "paralis", "nao acord", "sem respir"];
            const mentalUrgentKeywords = ["suicidio", "me matar", "se matar", "tirar a vida", "acabar com tudo", "nao quer viver", "quer morrer", "desistir de viver", "pular da", "tomar remedio", "overdos", "me cort", "automutil", "sumir", "nao aguent mais", "dor insuportavel na alm", "dar um fim"];

            const chatContainerRef = useRef(null);

            const handleRestartChat = () => {
                setStep('chat');
                setChatInput('');
                setFullRelato('');
                setMessages([{ id: 1, sender: 'Lumi', text: 'Olá! Sou a Lumi, a inteligência artificial do SIGAC ✨ Conta pra mim: como você está se sentindo hoje? Seja o mais detalhista possível.' }]);
                setMatchedDoctors([]);
                setSelectedDoctor(null);
                setExtractedTags([]);
                setUrgencyType(null);
                setClinicalInsight('');
            };

            useEffect(() => {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [messages, step]);

            const analyzeContextAndMatch = (text, userMsgCount) => {
                const normalizedText = normalizeStr(text); 
                
                // 1. Verificação de Urgência
                let currentUrgency = null;
                if (mentalUrgentKeywords.some(kw => new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText))) {
                    currentUrgency = 'mental';
                } else if (medicalUrgentKeywords.some(kw => new RegExp(`\\b${normalizeStr(kw)}`, 'i').test(normalizedText))) {
                    currentUrgency = 'medical';
                }
                setUrgencyType(currentUrgency);

                // 2. Extração de Entidades (Tags)
                let tags = [];
                mockDoctors.forEach(doc => {
                    doc.keywords.forEach(kw => {
                        const normKw = normalizeStr(kw);
                        const regex = new RegExp(`\\b${normKw}`, 'i'); 
                        if (regex.test(normalizedText) && !tags.includes(kw)) {
                            tags.push(kw);
                        }
                    });
                });

                const finalTags = tags.filter(tag => {
                    const normTag = normalizeStr(tag);
                    return !tags.some(otherTag => {
                        const normOther = normalizeStr(otherTag);
                        return normOther !== normTag && normOther.startsWith(normTag);
                    });
                });
                setExtractedTags(finalTags);

                // 2.5 Gerar Insight Clínico Multidisciplinar
                let insight = "";
                const combinedTags = finalTags.join(" ");
                if (combinedTags.includes("borderlin") || combinedTags.includes("boderline") || combinedTags.includes("tpb")) {
                    insight = "O Transtorno de Personalidade Borderline (TPB) possui excelentes resultados através de uma abordagem multidisciplinar. O tratamento padrão-ouro une a Psiquiatria (regulação de humor e impulsividade) com a Psicoterapia (especialmente TCC ou DBT - Terapia Comportamental Dialética). Sugerimos agendar com ambos os profissionais abaixo.";
                } else if (combinedTags.includes("ansiedad") || combinedTags.includes("depress") || combinedTags.includes("panic") || combinedTags.includes("suicid")) {
                    insight = "Para quadros de saúde mental, o padrão-ouro é a abordagem multidisciplinar: aliar o acompanhamento psiquiátrico (alívio químico) à psicoterapia regular (raiz comportamental e emocional).";
                } else if (combinedTags.includes("obesidad") || combinedTags.includes("emagrec") || combinedTags.includes("gord")) {
                    insight = "O emagrecimento saudável e sustentável é melhor alcançado com uma equipe: um Endocrinologista (investigação hormonal/metabólica) e um Nutricionista (plano alimentar adequado).";
                } else if (combinedTags.includes("colun") || combinedTags.includes("ciatic") || combinedTags.includes("lombar") || combinedTags.includes("postur") || combinedTags.includes("artros")) {
                    insight = "Dores crônicas ortopédicas geralmente requerem avaliação com Ortopedista (diagnóstico e imagens) seguida de reabilitação com Fisioterapia e/ou Quiropraxia.";
                } else if (combinedTags.includes("tdah") || combinedTags.includes("autism") || combinedTags.includes("tea")) {
                    insight = "O manejo de neurodivergências (TDAH, TEA) tem resultados superiores com equipe multidisciplinar: Psiquiatria/Neurologia aliada a intervenções psicológicas para regulação executiva.";
                }
                setClinicalInsight(insight);

                // 3. Score Simples
                let scoredDocs = mockDoctors.map(doc => {
                    let score = 0;
                    if (doc.keywords) {
                        doc.keywords.forEach(kw => {
                            const normKw = normalizeStr(kw);
                            const regex = new RegExp(`\\b${normKw}`, 'i');
                            if (regex.test(normalizedText)) score += 1;
                        });
                    }
                    return { ...doc, score };
                });

                let bestMatches = scoredDocs.filter(d => d.score > 0).sort((a, b) => b.score - a.score);

                // 4. Lógica Follow-Up Dinâmico
                if (!currentUrgency) {
                    if (bestMatches.length === 0) {
                        if (userMsgCount === 1 && text.length < 20) {
                            setStep('chat');
                            setMessages(prev => [...prev, { 
                                id: Date.now(), 
                                sender: 'Lumi', 
                                text: 'Entendi o seu ponto. Mas para que eu seja bem precisa, você poderia me dar mais detalhes? Por exemplo, quando essa sensação começou ou onde dói mais?' 
                            }]);
                            return;
                        }
                        if (userMsgCount === 1 && (normalizedText.includes('ansiedad') || normalizedText.includes('trist') || normalizedText.includes('depress'))) {
                            setStep('chat');
                            setMessages(prev => [...prev, { 
                                id: Date.now(), 
                                sender: 'Lumi', 
                                text: 'Sinto muito que esteja passando por isso. Existe algum acontecimento recente (como algo no trabalho, família ou relacionamento) que você sinta que engatilhou isso?' 
                            }]);
                            return;
                        }
                        if (userMsgCount <= 2) {
                            setStep('chat');
                            setMessages(prev => [...prev, { 
                                id: Date.now(), 
                                sender: 'Lumi', 
                                text: 'Ainda estou calibrando o melhor perfil para você. Como isso tem afetado o seu dia a dia, a sua rotina ou o seu corpo ultimamente?' 
                            }]);
                            return; 
                        }
                        bestMatches = mockDoctors.filter(d => d.specialty === 'Clínica Geral');
                    }
                }

                setMatchedDoctors(bestMatches.slice(0, 4));
                setStep('results');
            };

            const handleSendSymptom = (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;

                const newUserMessage = { id: Date.now(), sender: 'User', text: chatInput };
                setMessages(prev => [...prev, newUserMessage]);
                
                const currentUserMessageCount = messages.filter(m => m.sender === 'User').length + 1;
                const newFullRelato = fullRelato ? `${fullRelato} E também: ${chatInput}` : chatInput;
                
                setFullRelato(newFullRelato);
                setChatInput(''); 

                setStep('loading');
                const phases = [
                    "Analisando risco e urgência clínica...", 
                    "Extraindo entidades e mapeando sintomas...", 
                    "Processando correlações cruzadas na base de dados...", 
                    "Buscando os especialistas mais compatíveis..."
                ];
                let i = 0; setLoadingText(phases[0]);
                const interval = setInterval(() => {
                    i++;
                    if (i < phases.length) setLoadingText(phases[i]);
                    else { 
                        clearInterval(interval); 
                        analyzeContextAndMatch(newFullRelato, currentUserMessageCount); 
                    }
                }, 1000); // 1s per phase
            };

            return (
                <div className="h-full flex flex-col bg-[#f8fafc]">
                    {step === 'chat' && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex-1 flex flex-col overflow-hidden">
                            <header className="p-4 bg-white/80 backdrop-blur-md border-b border-slate-200/60 sticky top-0 z-10 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                                        <Sparkles size={20} className="text-blue-600" />
                                    </div>
                                    <div>
                                        <h2 className="font-extrabold text-slate-900 text-sm">Lumi IA</h2>
                                        <p className="text-[11px] font-bold text-emerald-500 uppercase tracking-wide flex items-center gap-1"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Online e Pronta</p>
                                    </div>
                                </div>
                                {messages.length > 1 && (
                                    <button onClick={handleRestartChat} title="Reiniciar conversa" className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors flex items-center justify-center">
                                        <RefreshCw size={18} />
                                    </button>
                                )}
                            </header>

                            <div ref={chatContainerRef} className="flex-1 p-5 flex flex-col gap-5 overflow-y-auto hide-scrollbar scroll-smooth">
                                {messages.map((msg) => (
                                    <motion.div key={msg.id} initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className={`flex gap-3 items-end ${msg.sender === 'User' ? 'justify-end' : ''}`}>
                                        {msg.sender === 'Lumi' && (
                                            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shrink-0 shadow-md shadow-blue-500/20 text-white mb-1">
                                                <Sparkles size={14} />
                                            </div>
                                        )}
                                        <div className={`${msg.sender === 'User' ? 'bg-gradient-to-br from-blue-600 to-blue-700 text-white rounded-2xl rounded-br-sm shadow-md' : 'bg-white text-slate-800 rounded-2xl rounded-bl-sm border border-slate-200/60 shadow-sm'} p-4 text-sm max-w-[85%]`}>
                                            <p className="leading-relaxed font-medium">{msg.text}</p>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                            
                            <form onSubmit={handleSendSymptom} className="p-4 bg-white border-t border-slate-200/60 shadow-[0_-10px_20px_rgba(0,0,0,0.02)] relative shrink-0">
                                <div className="relative flex items-center">
                                    <input 
                                        type="text" 
                                        value={chatInput} 
                                        onChange={(e) => setChatInput(e.target.value)} 
                                        placeholder="Digite seus sintomas aqui..." 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-full pl-5 pr-14 py-4 text-sm font-medium outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 transition-all shadow-inner" 
                                        autoFocus 
                                    />
                                    <button type="submit" disabled={!chatInput.trim()} className="absolute right-2 w-11 h-11 bg-blue-600 text-white rounded-full flex items-center justify-center disabled:bg-slate-300 disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/20">
                                        <Send size={18} className="ml-0.5" />
                                    </button>
                                </div>
                                <p className="text-center text-[10px] font-semibold text-slate-400 mt-3">A IA do SIGAC não substitui um diagnóstico médico presencial.</p>
                            </form>
                        </motion.div>
                    )}

                    {step === 'loading' && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex-1 flex flex-col items-center justify-center p-6 text-center bg-white">
                            <div className="relative w-28 h-28 mb-8">
                                <motion.div animate={{ rotate: 360 }} transition={{ duration: 3, repeat: Infinity, ease: "linear" }} className="absolute inset-0 rounded-full border-[6px] border-slate-50 border-t-blue-600 border-r-indigo-500 shadow-xl" />
                                <div className="absolute inset-0 flex items-center justify-center bg-white rounded-full m-2 shadow-inner">
                                    <BrainCircuit size={40} className="text-transparent bg-clip-text bg-gradient-to-br from-blue-600 to-indigo-600" style={{stroke: "url(#blue-grad)"}} />
                                    <svg width="0" height="0"><defs><linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#2563eb" /><stop offset="100%" stopColor="#4f46e5" /></linearGradient></defs></svg>
                                </div>
                            </div>
                            <h3 className="text-xl font-extrabold text-slate-900 mb-2">{loadingText}</h3>
                            <p className="text-base font-medium text-slate-500 max-w-[280px]">Estamos cruzando seu relato com a base de dados de mais de 60 especialidades.</p>
                        </motion.div>
                    )}

                    {step === 'results' && (
                        <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="flex-1 flex flex-col p-5 bg-slate-50 overflow-y-auto hide-scrollbar">
                            
                            <button onClick={() => setStep('chat')} className="text-sm font-bold text-slate-500 flex items-center gap-1.5 mb-6 hover:text-slate-900 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm w-fit"><ChevronLeft size={16}/> Voltar ao chat</button>

                            {/* URGÊNCIA MÉDICA */}
                            {urgencyType === 'medical' && (
                                <motion.div initial={{scale:0.95}} animate={{scale:1}} className="bg-rose-50 border-2 border-rose-200 rounded-2xl p-5 mb-6 shadow-sm flex items-start gap-4">
                                    <div className="bg-rose-100 p-2 rounded-full shrink-0">
                                        <AlertTriangle size={28} className="text-rose-600" />
                                    </div>
                                    <div>
                                        <h3 className="font-extrabold text-rose-800 text-base mb-1">Atenção: Possível Urgência Médica</h3>
                                        <p className="text-rose-700 text-sm font-medium leading-relaxed">Detectamos termos críticos no seu relato. Se estiver em situação de emergência, <strong>ligue 192 (SAMU)</strong> ou vá ao pronto-socorro mais próximo imediatamente.</p>
                                    </div>
                                </motion.div>
                            )}

                            {/* URGÊNCIA MENTAL */}
                            {urgencyType === 'mental' && (
                                <motion.div initial={{scale:0.95}} animate={{scale:1}} className="bg-purple-50 border-2 border-purple-200 rounded-2xl p-5 mb-6 shadow-sm flex items-start gap-4">
                                    <div className="bg-purple-100 p-2 rounded-full shrink-0">
                                        <AlertTriangle size={28} className="text-purple-600" />
                                    </div>
                                    <div>
                                        <h3 className="font-extrabold text-purple-800 text-base mb-1">Você não está sozinho(a).</h3>
                                        <p className="text-purple-700 text-sm font-medium leading-relaxed">Se estiver em dor extrema e precisando de apoio imediato, <strong>ligue grátis para 188 (CVV)</strong>. Funciona 24h em sigilo. Existem pessoas querendo te ouvir agora.</p>
                                    </div>
                                </motion.div>
                            )}

                            {/* Resumo da IA */}
                            <div className="bg-white border border-slate-200 rounded-2xl p-5 mb-8 shadow-sm">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-sm font-extrabold uppercase tracking-wider text-slate-800 flex items-center gap-2">
                                        <Sparkles size={18} className="text-blue-500" /> Diagnóstico Pré-Clínico IA
                                    </h3>
                                    <button 
                                        onClick={() => { 
                                            setStep('chat'); 
                                            setChatInput(fullRelato); 
                                            setFullRelato(''); 
                                            setExtractedTags([]);
                                            setUrgencyType(null);
                                            setClinicalInsight('');
                                            setMessages([{ id: 1, sender: 'Lumi', text: 'Sem problemas. O que você gostaria de corrigir ou adicionar ao seu relato?' }]); 
                                        }} 
                                        className="text-blue-600 text-xs font-extrabold uppercase flex items-center gap-1.5 hover:bg-blue-50 px-2 py-1.5 rounded-lg transition-colors"
                                    >
                                        <Edit3 size={14} /> Editar Relato
                                    </button>
                                </div>
                                <p className="text-slate-700 font-medium text-sm italic mb-5 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 border-l-4 border-l-blue-400">"{fullRelato}"</p>
                                
                                {extractedTags.length > 0 && (
                                    <div className="pt-2">
                                        <p className="text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-2.5 flex items-center gap-1.5"><Zap size={14} className="text-amber-500" /> Entidades (Tags) mapeadas</p>
                                        <div className="flex flex-wrap gap-2">
                                            {extractedTags.map((tag, idx) => (
                                                <span key={idx} className="bg-indigo-50 text-indigo-700 border border-indigo-100 text-xs font-bold px-2.5 py-1 rounded-lg capitalize shadow-sm">
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {clinicalInsight && (
                                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="bg-indigo-50 border border-indigo-200 rounded-2xl p-5 mb-8 shadow-sm">
                                    <h3 className="font-extrabold text-indigo-900 text-sm mb-2 flex items-center gap-2">
                                        <BrainCircuit size={18} className="text-indigo-600" /> Insight Clínico da Lumi
                                    </h3>
                                    <p className="text-indigo-800 text-sm font-medium leading-relaxed">
                                        {clinicalInsight}
                                    </p>
                                </motion.div>
                            )}

                            <h2 className="text-2xl font-extrabold text-slate-900 mb-5 tracking-tight">O match perfeito para você</h2>
                            <p className="text-slate-500 text-sm font-medium mb-6">Com base na análise, selecionamos os melhores especialistas da nossa rede.</p>
                            
                            <div className="flex flex-col gap-5 pb-8">
                                {matchedDoctors.map((doc, i) => (
                                    <motion.div key={doc.id} initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: i * 0.15 }}>
                                        <Card onClick={() => { setSelectedDoctor(doc); setStep('scheduling'); }} className="overflow-hidden border-slate-200/80 hover:border-blue-300">
                                            <div className="p-5 flex gap-5">
                                                <div className="relative shrink-0">
                                                    <img src={doc.avatar} alt={doc.name} className="w-20 h-20 rounded-full border-2 border-white shadow-md object-cover" />
                                                    <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full border-2 border-white flex items-center gap-1 shadow-sm">
                                                        <Star size={10} className="fill-white"/> {doc.affinity}
                                                    </div>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <h3 className="font-extrabold text-lg text-slate-900 leading-tight">{doc.name}</h3>
                                                    </div>
                                                    <p className="text-sm text-blue-600 font-extrabold mb-0.5">{doc.specialty}</p>
                                                    <p className="text-[12px] font-semibold text-slate-500 mb-3">{doc.subspecialty}</p>
                                                    <div className="bg-slate-50 border border-slate-100 px-3 py-2 rounded-lg inline-flex">
                                                        <p className="text-[11px] font-bold text-slate-600 flex items-center gap-1.5"><User size={12} className="text-slate-400"/> Perfil: {doc.vibe}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </Card>
                                    </motion.div>
                                ))}
                            </div>
                        </motion.div>
                    )}

                    {step === 'scheduling' && (
                        <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="flex-1 flex flex-col p-6 bg-white overflow-y-auto hide-scrollbar">
                            <button onClick={() => setStep('results')} className="text-sm font-bold text-slate-500 flex items-center gap-1.5 mb-8 hover:text-slate-900 bg-slate-50 px-4 py-2 rounded-full border border-slate-200 shadow-sm w-fit"><ChevronLeft size={16}/> Voltar às opções</button>
                            
                            <div className="flex items-center gap-5 mb-8 pb-8 border-b border-slate-100">
                                <img src={selectedDoctor.avatar} className="w-20 h-20 rounded-full border-2 border-white shadow-md" alt="Doc" />
                                <div>
                                    <h2 className="text-2xl font-extrabold text-slate-900 tracking-tight">{selectedDoctor.name}</h2>
                                    <p className="text-base font-bold text-blue-600 mt-1">{selectedDoctor.specialty}</p>
                                    <Badge variant="primary" className="mt-2"><Flame size={12} className="inline mr-1"/> Alta Afinidade ({selectedDoctor.affinity})</Badge>
                                </div>
                            </div>
                            
                            <h3 className="font-extrabold text-slate-900 text-lg mb-4">Escolha a Data</h3>
                            <div className="flex gap-3 overflow-x-auto pb-6 snap-x hide-scrollbar mb-4">
                                {availableDates.map(date => (
                                    <button key={date} onClick={() => { setSelectedDate(date); setSelectedTime(''); }} className={`shrink-0 px-5 py-3 rounded-xl border-2 text-sm transition-all shadow-sm ${selectedDate === date ? 'bg-blue-600 border-blue-600 text-white font-extrabold scale-[1.02]' : 'bg-white border-slate-200 text-slate-700 font-bold hover:border-slate-300'}`}>
                                        {date}
                                    </button>
                                ))}
                            </div>

                            <h3 className="font-extrabold text-slate-900 text-lg mb-4 mt-2">Escolha o Horário</h3>
                            <div className="grid grid-cols-3 gap-3 mb-10">
                                {availableTimes.map(time => (
                                    <button key={time} onClick={() => setSelectedTime(time)} className={`py-3 rounded-xl border-2 text-sm transition-all shadow-sm ${selectedTime === time ? 'bg-blue-50 border-blue-500 text-blue-800 font-extrabold scale-[1.02]' : 'bg-white border-slate-200 text-slate-700 font-bold hover:border-slate-300'}`}>
                                        {time}
                                    </button>
                                ))}
                            </div>

                            <Button className="w-full mt-auto mb-4 h-14 text-lg shadow-xl shadow-blue-500/20" disabled={!selectedTime} onClick={() => setStep('success')}>Confirmar Agendamento</Button>
                        </motion.div>
                    )}

                    {step === 'success' && (
                        <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-blue-600 to-indigo-700 text-white">
                            <motion.div initial={{scale:0}} animate={{scale:1}} transition={{type:"spring", bounce:0.5}} className="w-28 h-28 bg-white rounded-full flex items-center justify-center mb-8 shadow-2xl">
                                <CheckCircle2 size={64} className="text-emerald-500" />
                            </motion.div>
                            <h2 className="text-4xl font-extrabold mb-3 tracking-tight">Agendado!</h2>
                            <p className="text-blue-100 text-lg font-medium mb-10 max-w-[250px]">Sua consulta foi confirmada com sucesso em nossa rede.</p>
                            
                            <div className="bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-2xl w-full mb-10 text-left">
                                <p className="text-blue-100 text-[11px] uppercase font-bold tracking-wider mb-1">Resumo</p>
                                <p className="font-extrabold text-lg">{selectedDoctor.name}</p>
                                <p className="font-medium text-sm text-blue-100">{selectedDate} às {selectedTime}</p>
                            </div>

                            <Button variant="outline" className="w-full bg-white text-blue-700 border-none h-14 font-extrabold hover:bg-blue-50" onClick={onFinish}>Voltar ao Início</Button>
                        </motion.div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 2. DOCTOR APP & SCREENS (Dashboard Profissional)
        // ==========================================
        function DoctorApp({ onLogout }) {
            const [docTab, setDocTab] = useState('dashboard');
            const [activePatientRecord, setActivePatientRecord] = useState(null);

            if (activePatientRecord) {
                return <MedicalRecordView patient={activePatientRecord} onBack={() => setActivePatientRecord(null)} />;
            }

            return (
                <div className="flex-1 flex flex-col md:flex-row bg-[#f8fafc] w-full h-full">
                    <aside className="w-full md:w-72 bg-white border-b md:border-b-0 md:border-r border-slate-200/80 flex flex-col shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
                        <div className="hidden md:flex items-center gap-4 p-6 border-b border-slate-100 bg-slate-50/50">
                            <img src={mockDoctors[0].avatar} alt="Doctor" className="w-14 h-14 rounded-full border-2 border-white shadow-sm object-cover" />
                            <div>
                                <h3 className="font-extrabold text-base text-slate-900 leading-tight">Dra. Ana Silva</h3>
                                <p className="text-sm font-bold text-blue-600 mt-0.5">Neurologista</p>
                                <Badge variant="success" className="mt-1">Online</Badge>
                            </div>
                        </div>
                        <nav className="flex md:flex-col gap-2 p-3 md:p-5 overflow-x-auto hide-scrollbar">
                            <p className="hidden md:block text-[11px] font-extrabold uppercase tracking-wider text-slate-400 mb-2 mt-2 px-3">Gestão Diária</p>
                            <DocNavButton icon={LayoutDashboard} label="Resumo do Dia" active={docTab === 'dashboard'} onClick={() => setDocTab('dashboard')} />
                            <DocNavButton icon={Users} label="Meus Pacientes" active={docTab === 'patients'} onClick={() => setDocTab('patients')} />
                            <DocNavButton icon={CalendarIcon} label="Agenda Completa" active={docTab === 'calendar'} onClick={() => setDocTab('calendar')} />
                            
                            <p className="hidden md:block text-[11px] font-extrabold uppercase tracking-wider text-slate-400 mb-2 mt-6 px-3">Configurações</p>
                            <DocNavButton icon={Settings} label="Perfil Médico" active={docTab === 'settings'} onClick={() => {}} />
                        </nav>
                        <div className="mt-auto p-5 hidden md:block border-t border-slate-100 bg-slate-50/50">
                            <button onClick={onLogout} className="flex items-center gap-3 px-4 py-3 w-full text-left rounded-xl text-sm font-bold text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors border border-transparent hover:border-red-100">
                                Sair da Conta Segura
                            </button>
                        </div>
                    </aside>
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 hide-scrollbar scroll-smooth">
                        <AnimatePresence mode="wait">
                            {docTab === 'dashboard' && <DocOverview key="dash" onOpenPatient={(p) => setActivePatientRecord(p)} />}
                            {docTab === 'patients' && <DocPatientsList key="pat" onOpenPatient={(p) => setActivePatientRecord(p)} />}
                            {docTab === 'calendar' && <DocCalendar key="cal" />}
                        </AnimatePresence>
                    </main>
                </div>
            );
        }

        const DocNavButton = ({ icon: Icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all duration-200 ${active ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20 translate-x-1' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>
                <Icon size={20} strokeWidth={active ? 2.5 : 2} /> <span className="hidden md:inline">{label}</span><span className="md:hidden">{label}</span>
            </button>
        );

        function DocOverview({ onOpenPatient }) {
            const [selectedPreview, setSelectedPreview] = useState(null);

            return (
                <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} className="max-w-6xl mx-auto">
                    <header className="mb-10">
                        <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Bom dia, Dra. Ana. ☕</h1>
                        <p className="text-slate-500 font-medium text-lg mt-1">Aqui está o resumo da sua agenda e insights para hoje.</p>
                    </header>
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-5 mb-10">
                        <Card className="p-5 border border-slate-200/60 shadow-sm"><p className="text-sm font-bold text-slate-500 mb-2 flex items-center gap-2"><Users size={18} className="text-blue-600"/> Consultas Hoje</p><p className="text-4xl font-extrabold text-slate-900">5</p></Card>
                        <Card className="p-5 border border-slate-200/60 shadow-sm"><p className="text-sm font-bold text-slate-500 mb-2 flex items-center gap-2"><User size={18} className="text-amber-500"/> Primeiras (IA)</p><p className="text-4xl font-extrabold text-slate-900">3</p></Card>
                        <Card className="p-5 border border-slate-200/60 shadow-sm"><p className="text-sm font-bold text-slate-500 mb-2 flex items-center gap-2"><Activity size={18} className="text-emerald-500"/> Retornos</p><p className="text-4xl font-extrabold text-slate-900">2</p></Card>
                        <Card className="p-5 border border-slate-200/60 shadow-sm bg-gradient-to-br from-indigo-600 to-blue-700 text-white"><p className="text-sm font-bold text-indigo-200 mb-2 flex items-center gap-2"><Flame size={18} className="text-indigo-200"/> Match Rate IA</p><p className="text-4xl font-extrabold text-white">96%</p></Card>
                    </div>

                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="px-6 py-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h2 className="text-lg font-extrabold text-slate-900 flex items-center gap-2"><CalendarIcon size={20} className="text-blue-600"/> Agenda de Hoje</h2>
                            <Badge variant="default" className="bg-white shadow-sm">5 de Maio, 2026</Badge>
                        </div>
                        <div className="divide-y divide-slate-100">
                            {mockAppointments.map((apt) => (
                                <div key={apt.id} className="flex items-center p-5 hover:bg-blue-50/50 transition-colors group">
                                    <div className="w-20 shrink-0 border-r-2 border-slate-100 mr-5 text-left">
                                        <span className="text-xl font-extrabold text-slate-900">{apt.time}</span>
                                    </div>
                                    <div className="flex-1 cursor-pointer" onClick={() => setSelectedPreview(apt)}>
                                        <h3 className="font-extrabold text-lg text-slate-900 group-hover:text-blue-700 transition-colors">{apt.patient}</h3>
                                        <Badge variant={apt.type === 'Primeira Consulta' ? 'warning' : (apt.type === 'Emergência' ? 'danger' : 'success')} className="mt-1.5 shadow-sm">{apt.type}</Badge>
                                    </div>
                                    <Button variant="secondary" onClick={() => onOpenPatient(apt)} className="font-extrabold text-sm border-blue-200 bg-white hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                        Abrir Prontuário EMR
                                    </Button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedPreview && (
                        <Modal isOpen={!!selectedPreview} onClose={() => setSelectedPreview(null)} title="Visão Rápida (Preview)">
                            <div className="p-2 space-y-5">
                                <div>
                                    <h2 className="text-2xl font-extrabold text-slate-900">{selectedPreview.patient}</h2>
                                    <p className="text-sm font-bold text-blue-600 mt-1">{selectedPreview.time} • {selectedPreview.type}</p>
                                </div>
                                
                                <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5">
                                    <h4 className="flex items-center gap-2 text-[11px] uppercase tracking-wider font-extrabold text-blue-800 mb-3"><Sparkles size={16} /> Triagem Realizada pela IA</h4>
                                    <p className="text-sm text-slate-800 font-medium italic border-l-4 border-blue-400 pl-3 leading-relaxed">"{selectedPreview.triage}"</p>
                                </div>
                                <Button className="w-full h-14 text-base" onClick={() => { onOpenPatient(selectedPreview); setSelectedPreview(null); }}>Entrar no Prontuário Completo</Button>
                            </div>
                        </Modal>
                    )}
                </motion.div>
            );
        }

        function DocPatientsList({ onOpenPatient }) {
            const [search, setSearch] = useState('');
            const filtered = mockAllPatients.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.email.toLowerCase().includes(search.toLowerCase()));

            return (
                <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} className="max-w-6xl mx-auto h-full flex flex-col">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Base de Pacientes</h1>
                            <p className="text-slate-500 font-medium mt-1">Gestão, histórico e EMR de todos os seus pacientes vinculados.</p>
                        </div>
                        <div className="relative w-full md:w-96 shadow-sm rounded-xl">
                            <Search size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input type="text" placeholder="Buscar por nome, email ou CPF..." value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white" />
                        </div>
                    </div>

                    <Card className="flex-1 overflow-hidden flex flex-col border-slate-200/60 shadow-sm rounded-2xl">
                        <div className="overflow-x-auto hide-scrollbar">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th className="px-6 py-4 font-extrabold text-slate-600 uppercase text-[11px] tracking-wider">Nome do Paciente</th>
                                        <th className="px-6 py-4 font-extrabold text-slate-600 uppercase text-[11px] tracking-wider">Demográficos</th>
                                        <th className="px-6 py-4 font-extrabold text-slate-600 uppercase text-[11px] tracking-wider">Última Consulta</th>
                                        <th className="px-6 py-4 font-extrabold text-slate-600 uppercase text-[11px] tracking-wider">Contato</th>
                                        <th className="px-6 py-4 font-extrabold text-slate-600 uppercase text-[11px] tracking-wider text-right">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filtered.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-6 py-5 font-extrabold text-slate-900 text-base">{p.name}</td>
                                            <td className="px-6 py-5 font-medium text-slate-500">{p.age} anos • {p.gender}</td>
                                            <td className="px-6 py-5 font-bold text-slate-700">{p.lastVisit}</td>
                                            <td className="px-6 py-5 font-medium text-slate-600"><p>{p.phone}</p><p className="text-xs text-slate-400 mt-0.5">{p.email}</p></td>
                                            <td className="px-6 py-5 text-right">
                                                <Button variant="outline" className="h-9 text-xs font-bold border-slate-300" onClick={() => onOpenPatient({...p, type: 'Consulta Histórica', triage: 'N/A - Acesso via busca direta no painel de gestão.'})}>Abrir Prontuário</Button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {filtered.length === 0 && (
                                <div className="text-center py-20">
                                    <Users size={48} className="mx-auto text-slate-200 mb-4" />
                                    <p className="text-lg font-bold text-slate-500">Nenhum paciente encontrado na busca.</p>
                                </div>
                            )}
                        </div>
                    </Card>
                </motion.div>
            );
        }

        function DocCalendar() {
            return (
                <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} className="max-w-6xl mx-auto flex flex-col h-full">
                    <header className="mb-8">
                        <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Agenda Completa</h1>
                        <p className="text-slate-500 font-medium mt-1">Visão semanal de blocos e agendamentos.</p>
                    </header>
                    <Card className="flex-1 p-8 flex items-center justify-center bg-slate-50/50 border-dashed border-2 border-slate-300 rounded-2xl">
                        <div className="text-center max-w-md">
                            <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100">
                                <CalendarIcon size={48} className="text-blue-200" />
                            </div>
                            <h3 className="text-2xl font-extrabold text-slate-800 mb-3 tracking-tight">Módulo de Calendário (Full-Screen)</h3>
                            <p className="text-base font-medium text-slate-500 leading-relaxed">Nesta versão MVP corporativa, o calendário de blocos complexos (FullCalendar) está abstraído. Utilize a aba <strong>"Resumo do Dia"</strong> para o fluxo principal de atendimento.</p>
                        </div>
                    </Card>
                </motion.div>
            );
        }

        // PRONTUÁRIO (EMR) COMPLETÍSSIMO
        function MedicalRecordView({ patient, onBack }) {
            const [emrTab, setEmrTab] = useState('resumo');

            return (
                <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 20 }} className="flex-1 flex flex-col h-full bg-white z-[60] absolute inset-0 overflow-hidden">
                    <header className="bg-slate-900 text-white px-6 py-4 flex items-center justify-between shrink-0 shadow-lg relative z-20">
                        <div className="flex items-center gap-5">
                            <button onClick={onBack} className="p-2.5 bg-slate-800/80 hover:bg-slate-700 rounded-xl transition-all border border-slate-700"><ChevronLeft size={24} /></button>
                            <div>
                                <h1 className="text-2xl font-extrabold tracking-tight">{patient.patient || patient.name}</h1>
                                <div className="flex items-center gap-3 mt-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                    <span className="bg-slate-800 px-2 py-0.5 rounded">ID: #{patient.id}</span>
                                    <span>Nasc: 12/04/1985 (41 anos)</span>
                                    <span className="text-blue-400">Convênio: Unimed Sigma</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <Button variant="outline" className="border-slate-700 bg-slate-800 text-white hover:bg-slate-700 hover:text-white h-12">Salvar Rascunho</Button>
                            <Button className="bg-emerald-600 hover:bg-emerald-500 text-white border-none h-12 shadow-lg shadow-emerald-900/50">Finalizar Consulta</Button>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-50/50">
                        <aside className="w-full md:w-80 bg-white border-r border-slate-200/80 shrink-0 flex flex-col overflow-y-auto hide-scrollbar z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                <h3 className="text-[11px] font-extrabold uppercase text-slate-400 tracking-wider mb-4">Informações Demográficas</h3>
                                <div className="space-y-4 text-sm font-semibold">
                                    <p className="flex items-center gap-3 text-slate-700"><Phone size={18} className="text-slate-400"/> (11) 98765-4321</p>
                                    <p className="flex items-center gap-3 text-slate-700"><Mail size={18} className="text-slate-400"/> contato@paciente.com</p>
                                    <p className="flex items-center gap-3 text-slate-700 items-start"><MapPin size={18} className="text-slate-400 shrink-0 mt-0.5"/> Av. Paulista, 1000 - Apto 42<br/>Bela Vista - São Paulo, SP</p>
                                </div>
                            </div>
                            <div className="p-5 flex-1">
                                <h3 className="text-[11px] font-extrabold uppercase text-slate-400 tracking-wider mb-3 ml-2">Módulos do Prontuário</h3>
                                <nav className="flex flex-col gap-1.5">
                                    <button onClick={() => setEmrTab('resumo')} className={`text-left px-4 py-3 rounded-xl text-sm font-bold transition-all ${emrTab === 'resumo' ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>Consulta Atual (SOAP)</button>
                                    <button onClick={() => setEmrTab('historico')} className={`text-left px-4 py-3 rounded-xl text-sm font-bold transition-all ${emrTab === 'historico' ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>Evolução e Histórico Clínico</button>
                                    <button onClick={() => setEmrTab('prescricao')} className={`text-left px-4 py-3 rounded-xl text-sm font-bold transition-all ${emrTab === 'prescricao' ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>Prescrição Eletrônica</button>
                                    <button onClick={() => setEmrTab('exames')} className={`text-left px-4 py-3 rounded-xl text-sm font-bold transition-all ${emrTab === 'exames' ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>Exames e Anexos Digitais</button>
                                </nav>
                            </div>
                        </aside>

                        <main className="flex-1 p-6 lg:p-10 overflow-y-auto hide-scrollbar scroll-smooth">
                            {emrTab === 'resumo' && (
                                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="max-w-4xl space-y-8 pb-10">
                                    <div className="bg-blue-50/80 border border-blue-200 rounded-2xl p-6 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                                            <BrainCircuit size={100} />
                                        </div>
                                        <div className="flex items-center justify-between mb-4 relative z-10">
                                            <h3 className="font-extrabold text-blue-900 flex items-center gap-2 text-lg"><Sparkles size={20}/> Relato Inteligente de Triagem (IA)</h3>
                                            <Badge variant="primary" className="bg-blue-100 border-none px-3">{patient.time || "Consulta Anterior"}</Badge>
                                        </div>
                                        <p className="text-blue-900 text-base font-medium leading-relaxed italic border-l-4 border-blue-500 pl-4 bg-white/60 backdrop-blur-sm p-4 rounded-r-xl relative z-10 shadow-sm">"{patient.triage}"</p>
                                    </div>
                                    
                                    <Card className="p-8 border-slate-200/80 shadow-md">
                                        <h3 className="text-xl font-extrabold text-slate-900 mb-6 border-b border-slate-100 pb-4">Anotações Clínicas (Método SOAP)</h3>
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-sm font-extrabold uppercase tracking-wider text-slate-500 mb-2">S - Subjetivo (Queixa Principal e HDA)</label>
                                                <textarea className="w-full border border-slate-200 rounded-xl p-4 text-sm min-h-[120px] font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-slate-50 focus:bg-white transition-all resize-y" placeholder="Relato do paciente, queixas, duração..."></textarea>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-extrabold uppercase tracking-wider text-slate-500 mb-2">O - Objetivo (Exame Físico e Sinais Vitais)</label>
                                                <textarea className="w-full border border-slate-200 rounded-xl p-4 text-sm min-h-[120px] font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-slate-50 focus:bg-white transition-all resize-y" placeholder="PA: 120/80 mmHg, FC: 75 bpm, Estado Geral..."></textarea>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div>
                                                    <label className="block text-sm font-extrabold uppercase tracking-wider text-slate-500 mb-2">A - Avaliação (Diagnóstico / CID-10)</label>
                                                    <input type="text" className="w-full border border-slate-200 rounded-xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-slate-50 focus:bg-white transition-all" placeholder="Buscar CID-10 ou Hipótese Diagnóstica" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-extrabold uppercase tracking-wider text-slate-500 mb-2">P - Plano (Conduta Terapêutica)</label>
                                                    <input type="text" className="w-full border border-slate-200 rounded-xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-slate-50 focus:bg-white transition-all" placeholder="Ex: Solicitação de RM, prescrição..." />
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                </motion.div>
                            )}

                            {emrTab === 'historico' && (
                                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="max-w-4xl pb-10">
                                    <h2 className="text-2xl font-extrabold text-slate-900 mb-8 tracking-tight">Linha do Tempo Evolutiva</h2>
                                    <div className="relative border-l-[3px] border-slate-200 ml-4 space-y-10 pb-8">
                                        <div className="relative pl-8">
                                            <div className="absolute w-6 h-6 bg-blue-600 rounded-full -left-[14px] top-0 ring-4 ring-slate-50 flex items-center justify-center shadow-md">
                                                <div className="w-2.5 h-2.5 bg-white rounded-full"></div>
                                            </div>
                                            <h4 className="font-extrabold text-xl text-slate-900">Consulta Inicial Investigativa</h4>
                                            <p className="text-sm font-bold text-slate-500 mb-4 mt-1">Dra. Ana Silva (Neurologia) • 10 Jan 2026</p>
                                            <Card className="p-6 bg-white border border-slate-200 shadow-sm">
                                                <p className="text-sm font-medium text-slate-700 leading-relaxed">
                                                    <strong>Subjetivo:</strong> Paciente queixou-se de episódios recorrentes de enxaqueca (2x/semana), latejante, unilateral, acompanhada de fotofobia. Piora com estresse no trabalho.<br/><br/>
                                                    <strong>Objetivo:</strong> Exame neurológico sumário sem alterações focais. PA 130x85.<br/><br/>
                                                    <strong>Avaliação:</strong> Migrânea sem aura (CID-10 G43.0).<br/><br/>
                                                    <strong>Plano:</strong> Prescrito Sumatriptano 50mg para crises. Solicitado diário de cefaleia. Retorno em 3 meses ou SN.
                                                </p>
                                            </Card>
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {emrTab === 'prescricao' && (
                                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="max-w-4xl pb-10">
                                    <h2 className="text-2xl font-extrabold text-slate-900 mb-6 tracking-tight">Prescrição e Documentos</h2>
                                    <Card className="p-8 border-slate-200 shadow-md">
                                        <div className="flex items-center gap-4 mb-6 pb-6 border-b border-slate-100">
                                            <div className="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">
                                                <FileText size={24} />
                                            </div>
                                            <div>
                                                <h3 className="font-extrabold text-lg text-slate-900">Nova Receita Digital</h3>
                                                <p className="text-sm font-medium text-slate-500">Módulo integrado padrão ICP-Brasil.</p>
                                            </div>
                                        </div>
                                        <div className="space-y-4 mb-8">
                                            <input type="text" className="w-full border border-slate-200 rounded-xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="Buscar medicamento na base Memed/Anvisa..." />
                                        </div>
                                        <div className="text-center py-10 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                            <p className="text-sm font-bold text-slate-500">Nenhum medicamento adicionado à receita atual.</p>
                                        </div>
                                        <div className="mt-8 flex gap-4">
                                            <Button className="h-12 w-full text-base">Gerar Receita e Assinar Digitalmente</Button>
                                            <Button variant="outline" className="h-12 w-full text-base">Gerar Atestado Médico</Button>
                                        </div>
                                    </Card>
                                </motion.div>
                            )}

                            {emrTab === 'exames' && (
                                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="max-w-4xl text-center py-32 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                    <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-100 shadow-inner">
                                        <Activity size={40} className="text-slate-300" />
                                    </div>
                                    <h3 className="text-2xl font-extrabold text-slate-800 mb-2 tracking-tight">Repositório Vazio</h3>
                                    <p className="text-base font-medium text-slate-500 max-w-[300px] mx-auto">Os resultados de exames laboratoriais, ressonâncias e imagens aparecerão aqui via integração PACs.</p>
                                    <Button variant="secondary" className="mt-8 shadow-sm">Solicitar Novo Exame</Button>
                                </motion.div>
                            )}
                        </main>
                    </div>
                </motion.div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
